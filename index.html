<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnitedTour.pk - Coming Soon</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="UnitedTour.pk - Crafting unforgettable travel experiences. We are launching soon.">
    <meta name="author" content="FSL">
    
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-color: #0f172a;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-1: #3b82f6;
            --gradient-2: #8b5cf6;
            --gradient-3: #ec4899;
            --gradient-4: #f43f5e;
            --accent-glow: rgba(139, 92, 246, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .bg-blob {
            position: absolute;
            filter: blur(120px);
            z-index: 0;
            border-radius: 50%;
            animation: float infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            top: -100px;
            left: -100px;
            opacity: 0.5;
            animation-duration: 12s;
        }

        .blob-2 {
            width: 450px;
            height: 450px;
            background: linear-gradient(135deg, var(--gradient-3), var(--gradient-4));
            bottom: -50px;
            right: -100px;
            opacity: 0.4;
            animation-duration: 10s;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(50px, 80px) scale(1.1) rotate(15deg); }
        }

        /* Main Glassmorphism Container */
        .container {
            z-index: 10;
            text-align: center;
            padding: 3rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        .logo {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            display: inline-block;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 300;
            color: var(--text-secondary);
            margin-bottom: 3.5rem;
            line-height: 1.6;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3.5rem;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            min-width: 120px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .time-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.4);
        }

        .time-box:hover::before {
            opacity: 1;
        }

        .time {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            display: block;
            margin-bottom: 0.5rem;
            color: #f8fafc;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Notification Form */
        .notify-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            max-width: 500px;
            margin: 0 auto;
        }

        .email-input {
            flex: 1;
            min-width: 200px;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .email-input:focus {
            border-color: #38bdf8;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .email-input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            transition: all 0.3s ease;
            opacity: 0;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 15px 25px -10px rgba(139, 92, 246, 0.8);
        }

        .btn:hover::after {
            animation: shine 1.5s ease-out;
            opacity: 1;
        }

        @keyframes shine {
            0% { left: -100%; top: -100%; }
            100% { left: 100%; top: 100%; }
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Footer / Developer Tag */
        .developer-tag {
            position: absolute;
            bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease forwards 1s;
        }

        .developer-tag a {
            color: #38bdf8;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
        }

        .developer-tag a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #38bdf8;
            transform: scaleX(0);
            transform-origin: bottom right;
            transition: transform 0.3s ease-out;
        }

        .developer-tag a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            .container {
                padding: 2.5rem 1.5rem;
            }
            .time-box {
                min-width: 90px;
                padding: 1rem;
                gap: 1rem;
            }
            .notify-container {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- Main Content -->
    <main class="container">
        <h1 class="logo">UnitedTour.pk</h1>
        <p class="subtitle">We're crafting an unforgettable travel experience for you. <br>Our new platform is launching soon!</p>
        
        <!-- Timer Section -->
        <div class="countdown">
            <div class="time-box">
                <span class="time" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="time" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="time" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-box">
                <span class="time" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>

        <!-- Notification Form -->
        <form class="notify-container" onsubmit="event.preventDefault(); submitForm();">
            <input type="email" id="email" class="email-input" placeholder="Enter your email address" required aria-label="Email Address">
            <button type="submit" class="btn" id="notify-btn">Notify Me</button>
        </form>
    </main>

    <!-- Developer Footer -->
    <footer class="developer-tag">
        Developed with <span style="color: #ec4899; animation: pulse 1.5s infinite;">♥</span> by <a href="#" target="_blank">FSL</a>
    </footer>

    <script>
        // Set launch date (30 days from current date)
        const countDownDate = new Date();
        countDownDate.setDate(countDownDate.getDate() + 30);

        // Update countdown every second
        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            // Calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // UI Update with leading zeros
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            // Expiry Check
            if (distance < 0) {
                clearInterval(timerInterval);
                document.querySelector(".countdown").innerHTML = "<div class='subtitle' style='margin:0; font-size: 1.5rem; color: #fff;'>We are live now!</div>";
            }
        }, 1000);

        // Interactive Button Feedback
        function submitForm() {
            const btn = document.getElementById('notify-btn');
            const emailInput = document.getElementById('email');
            
            if(emailInput.value) {
                const originalText = btn.innerText;
                const originalBg = btn.style.background;
                
                // Success state
                btn.innerText = 'Added! ✓';
                btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                btn.style.boxShadow = '0 10px 20px -10px rgba(16, 185, 129, 0.6)';
                
                emailInput.value = ''; // clear input
                emailInput.blur();
                
                // Reset state after 3 seconds
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = originalBg;
                    btn.style.boxShadow = '';
                }, 3000);
            }
        }
    </script>
</body>
</html>
